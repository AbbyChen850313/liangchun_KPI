<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>評分</title>
  <?!= include('_styles'); ?>
</head>
<body>

<div class="header">
  <h1>✏️ 員工評分</h1>
  <div class="subtitle" id="empTitle">載入中...</div>
</div>

<!-- 員工資訊 -->
<div class="info-bar" id="empInfoBar">
  <div class="info-row">
    <span class="info-label">姓名</span>
    <span class="info-value" id="empName">-</span>
  </div>
  <div class="info-row">
    <span class="info-label">科別</span>
    <span class="info-value" id="empSection">-</span>
  </div>
  <div class="info-row">
    <span class="info-label">年資</span>
    <span class="info-value" id="empTenure">-</span>
  </div>
  <div id="probationAlert" style="display:none;background:#fff9c4;border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12px;color:#f57f17">
    ⚠️ 試用期員工（未滿3個月），評分結果作為試用期表現參考。
  </div>
</div>

<!-- 即時分數預覽 -->
<div class="score-preview">
  <div>
    <div class="preview-label">目前平均分</div>
    <div class="preview-score" id="previewScore">--</div>
  </div>
  <div style="text-align:right">
    <div class="preview-label">加權後 (×<span id="weightLabel">?</span>)</div>
    <div class="preview-weighted" id="previewWeighted">--</div>
  </div>
</div>

<!-- 評分表單 -->
<form id="scoreForm">

  <!-- 六個評分項目 -->
  <div class="score-section">
    <div class="section-title">工作績效評分</div>
    <div id="scoreItems"></div>
  </div>

  <!-- 特殊加減分 -->
  <div class="score-section">
    <div class="section-title">特殊加減分</div>
    <input type="number" class="special-input" id="specialAdj"
           placeholder="如：+5 或 -10（有申誡/小功請填寫）"
           step="0.5" min="-30" max="30"
           oninput="updatePreview()">
    <div style="font-size:11px;color:#aaa;margin-top:6px">
      申誡：-5 ｜ 小過：-10 ｜ 大過：-20 ｜ 小功：+5 ｜ 大功：+10
    </div>
  </div>

  <!-- 備註 -->
  <div class="score-section">
    <div class="section-title">備註（選填）</div>
    <textarea class="note-textarea" id="noteText"
              placeholder="可填寫具體表現說明..."></textarea>
  </div>

</form>

<!-- 按鈕 -->
<div class="btn-group">
  <button class="btn btn-draft" onclick="saveDraft()">儲存草稿</button>
  <button class="btn btn-submit" id="submitBtn" onclick="submitScore()">確認送出</button>
</div>

<!-- 送出後修改提示 -->
<div style="text-align:center;font-size:11px;color:#aaa;padding-bottom:20px">
  截止日前可隨時返回修改
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 送出確認卡（替代 confirm popup） -->
<div id="confirmSubmitCard" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #f44336;padding:16px;box-shadow:0 -4px 12px rgba(0,0,0,.15);z-index:999">
  <div style="font-size:14px;margin-bottom:12px">確認送出 <strong id="confirmSubmitName"></strong> 的評分？截止日前可返回修改。</div>
  <div style="display:flex;gap:8px">
    <button class="btn" style="flex:1;padding:12px;background:#eee;color:#333" onclick="document.getElementById('confirmSubmitCard').style.display='none'">取消</button>
    <button class="btn btn-submit" style="flex:1;padding:12px" onclick="submitScore()">確認送出</button>
  </div>
</div>

<script>
const SCORE_ITEMS = [
  { key: 'item1', label: '【職能專業度】', desc: '根據公司任用職務項目，能充分自主完成工作' },
  { key: 'item2', label: '【工作效率】', desc: '工作效率高，如期達成工作目標' },
  { key: 'item3', label: '【成本意識】', desc: '成本意識強烈，能積極節省，避免浪費' },
  { key: 'item4', label: '【部門合作】', desc: '協作能力，能與同部門、跨部門同事配合' },
  { key: 'item5', label: '【責任感】', desc: '具有極責任心，能徹底達成任務' },
  { key: 'item6', label: '【主動積極】', desc: '能自動自發與人合作解決問題' },
];
const GRADES = [
  { label: '甲', score: 95, desc: '90-100分' },
  { label: '乙', score: 85, desc: '75-89分' },
  { label: '丙', score: 65, desc: '60-74分' },
  { label: '丁', score: 35, desc: '0-59分' },
];

// 從 URL 取得參數
const params = new URLSearchParams(location.search);
const lineUid = decodeURIComponent(params.get('uid') || '<?= lineUid ?>');
const employeeName = decodeURIComponent(params.get('eid') || '');
const section = decodeURIComponent(params.get('section') || '');
const isTest = params.get('isTest') === 'true' || <?= isTest ?>;

let weight = 1;
let currentScores = {};

function init() {
  // 填入員工資訊
  document.getElementById('empName').textContent = employeeName;
  document.getElementById('empSection').textContent = section;
  document.getElementById('empTitle').textContent = employeeName;

  // 渲染評分項目
  renderScoreItems();

  // 載入既有評分（草稿或已送出）
  loadExistingScores();
}

function renderScoreItems() {
  const container = document.getElementById('scoreItems');
  container.innerHTML = SCORE_ITEMS.map(item => `
    <div class="score-item">
      <div class="score-item-label">${item.label}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:6px">${item.desc}</div>
      <div class="grade-options">
        ${GRADES.map(g => `
          <div class="grade-btn" id="btn_${item.key}_${g.label}"
               onclick="selectGrade('${item.key}', '${g.label}')">
            <div class="grade-label">${g.label}</div>
            <div class="grade-score">${g.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectGrade(itemKey, grade) {
  // 清除同一項目的選取
  GRADES.forEach(g => {
    const btn = document.getElementById(`btn_${itemKey}_${g.label}`);
    if (btn) btn.className = 'grade-btn';
  });
  // 選取新等級
  const btn = document.getElementById(`btn_${itemKey}_${grade}`);
  if (btn) btn.className = `grade-btn selected-${grade}`;

  currentScores[itemKey] = grade;
  updatePreview();
}

function updatePreview() {
  const scores = Object.values(currentScores).filter(v => v);
  if (scores.length === 0) {
    document.getElementById('previewScore').textContent = '--';
    document.getElementById('previewWeighted').textContent = '--';
    return;
  }

  const gradeMap = { '甲': 95, '乙': 85, '丙': 65, '丁': 35 };
  const avg = scores.reduce((s, g) => s + gradeMap[g], 0) / scores.length;
  const special = parseFloat(document.getElementById('specialAdj').value) || 0;
  const final = avg + special;
  const weighted = final * weight;

  document.getElementById('previewScore').textContent = final.toFixed(1);
  document.getElementById('previewWeighted').textContent = `${weighted.toFixed(1)} 分`;
}

function loadExistingScores() {
  callGAS('apiGetMyScores', [lineUid, null]).then(allScores => {
    const existing = allScores[employeeName];
    if (!existing) return;

    // 填入已有評分
    Object.entries(existing.scores || {}).forEach(([key, val]) => {
      if (val) selectGrade(key, val);
    });
    if (existing.special) {
      document.getElementById('specialAdj').value = existing.special;
    }
    if (existing.note) {
      document.getElementById('noteText').value = existing.note;
    }
    updatePreview();

    if (existing.status === '已送出') {
      document.getElementById('submitBtn').textContent = '修改送出';
    }
  });

  // 取得員工年資等資訊
  callGAS('apiGetScoreStatus', [lineUid]).then(status => {
    const emp = (status.employees || []).find(e => e.name === employeeName);
    if (emp) {
      document.getElementById('empTenure').textContent = emp.tenure || '-';
      weight = emp.weight || 1;
      document.getElementById('weightLabel').textContent = weight;
      if (emp.isProbation) {
        document.getElementById('probationAlert').style.display = 'block';
      }
      updatePreview();
    }
  });
}

function getFormData() {
  return {
    lineUid,
    quarter: null, // GAS 會自動取得當前季度
    employeeName,
    section,
    scores: { ...currentScores },
    special: document.getElementById('specialAdj').value || '0',
    note: document.getElementById('noteText').value,
    isTest,
  };
}

function saveDraft() {
  const data = getFormData();
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '儲存中...';

  callGAS('apiSaveDraft', [data]).then(result => {
    btn.disabled = false;
    btn.textContent = '儲存草稿';
    if (result.error) {
      showToast('❌ ' + result.error);
    } else {
      showToast('✅ 草稿已儲存');
    }
  });
}

function submitScore() {
  const filled = Object.keys(currentScores).filter(k => currentScores[k]);
  if (filled.length < SCORE_ITEMS.length) {
    showToast('⚠️ 請填寫所有評分項目');
    return;
  }
  // 第一次點：顯示確認卡；第二次點（confirmSubmitCard 可見時）：直接送出
  const card = document.getElementById('confirmSubmitCard');
  if (card.style.display === 'none' || !card.style.display) {
    document.getElementById('confirmSubmitName').textContent = employeeName;
    card.style.display = 'block';
    return;
  }
  card.style.display = 'none';

  const data = getFormData();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  callGAS('apiSubmitScore', [data]).then(result => {
    btn.disabled = false;
    if (result.error) {
      btn.textContent = '確認送出';
      showToast('❌ ' + result.error);
    } else {
      btn.textContent = '修改送出';
      showToast(`✅ 已送出！加權分數：${result.weightedScore}`);
      setTimeout(() => history.back(), 1500);
    }
  });
}

function callGAS(fn, args) {
  return new Promise((resolve, reject) => {
    let runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn](...(args || []));
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
