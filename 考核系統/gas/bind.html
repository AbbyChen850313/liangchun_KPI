<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>帳號綁定</title>
  <?!= include('_styles'); ?>
</head>
<body>

<div class="header">
  <h1>🔗 帳號綁定</h1>
  <div class="subtitle" id="bindSubtitle">驗證您的身分</div>
</div>

<!-- 載入中 -->
<div id="loadingView" style="padding:40px 20px;text-align:center;color:#888">
  <div class="spinner" style="margin:0 auto 12px"></div>
  <div id="loadingStep">載入 SDK...</div>
</div>

<!-- 錯誤顯示（固定顯示，不會消失） -->
<div id="errorView" style="display:none;margin:12px 8px;padding:14px;background:#ffebee;border-radius:8px;color:#c62828;font-size:13px">
  <strong>錯誤：</strong><span id="errorMsg"></span>
</div>

<!-- 驗證碼畫面 -->
<div id="codeView" style="display:none">
  <div class="score-section" style="margin:12px 8px">
    <div class="section-title">請輸入綁定驗證碼</div>
    <div style="font-size:13px;color:#888;margin-bottom:12px">請向 HR 或管理員取得驗證碼</div>
    <div class="setting-group">
      <label class="setting-label">驗證碼</label>
      <input type="text" class="setting-input" id="inputBindCode" placeholder="請輸入驗證碼"
             autocomplete="off" style="letter-spacing:2px;font-size:18px;text-align:center">
    </div>
    <button class="btn btn-submit" style="width:100%;padding:14px;margin-top:4px" onclick="doVerifyCode()">
      驗證
    </button>
  </div>
</div>

<!-- 輸入表單 -->
<div id="formView" style="display:none">
  <div class="score-section" style="margin:12px 8px">
    <div class="section-title">請輸入員工資料</div>

    <div class="setting-group">
      <label class="setting-label">姓名</label>
      <input type="text" class="setting-input" id="inputName" placeholder="請輸入您的姓名">
    </div>

    <div class="setting-group">
      <label class="setting-label">員工編號</label>
      <input type="text" class="setting-input" id="inputEmployeeId" placeholder="請輸入員工編號">
    </div>

    <div class="setting-group">
      <label class="setting-label">手機號碼</label>
      <input type="tel" class="setting-input" id="inputPhone" placeholder="例：0912345678">
    </div>

    <button class="btn btn-submit" style="width:100%;padding:14px;margin-top:4px" onclick="doBindByIdentity()">
      確認綁定
    </button>
  </div>
</div>

<!-- 已綁定畫面 -->
<div id="alreadyBoundView" style="display:none">
  <div style="padding:40px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">✅</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:8px">帳號已綁定</div>
    <div style="font-size:14px;color:#555;margin-bottom:24px" id="alreadyBoundName"></div>
    <button class="btn btn-submit" style="width:80%;padding:14px" onclick="goToDashboard()">
      進入考核系統
    </button>
  </div>
</div>

<!-- 綁定成功畫面 -->
<div id="successView" style="display:none">
  <div style="padding:40px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">🎉</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:8px">綁定成功！</div>
    <div style="font-size:14px;color:#555;margin-bottom:4px" id="successName"></div>
    <div style="font-size:13px;color:#888;margin-bottom:24px">
      您的帳號已完成綁定，即可開始使用。
    </div>
    <button class="btn btn-submit" style="width:80%;padding:14px" onclick="goToDashboard()">
      進入考核系統
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const liffId = '<?= liffId ?>';
const isTest = <?!= isTest ? 'true' : 'false' ?>;
let lineUid = '';
let displayName = '';

function showCodeInput() {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('codeView').style.display = 'block';
}

function showForm() {
  document.getElementById('codeView').style.display = 'none';
  document.getElementById('formView').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorView').style.display = 'block';
}

async function init() {
  const s = document.createElement('script');
  s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
  s.onerror = () => showError('LINE SDK 載入失敗，請重新整理');
  s.onload = async () => {
    try {
      document.getElementById('loadingStep').textContent = `LIFF 初始化... (ID: ${liffId})`;
      await Promise.race([
        liff.init({ liffId: liffId }),
        new Promise((_, reject) => setTimeout(() => reject(new Error(`timeout | liffId=${liffId} | url=${location.href}`)), 10000)),
      ]);
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }
      document.getElementById('loadingStep').textContent = '取得身分資料...';
      const profile = await liff.getProfile();
      lineUid = profile.userId;
      displayName = profile.displayName;

      document.getElementById('loadingStep').textContent = '查詢帳號狀態...';
      // 確認是否已綁定（加 10 秒 timeout 避免永久轉圈）
      let check;
      try {
        check = await Promise.race([
          callGAS('apiCheckBinding', [lineUid, isTest]),
          new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 10000)),
        ]);
      } catch (e) {
        showForm(); // timeout 或錯誤時直接顯示表單
        return;
      }

      document.getElementById('loadingView').style.display = 'none';
      if (check.bound) {
        document.getElementById('alreadyBoundName').textContent =
          `您好，${check.name}（${check.jobTitle}）`;
        document.getElementById('alreadyBoundView').style.display = 'block';
      } else {
        showCodeInput();
      }
    } catch (err) {
      showError(err.message);
    }
  };
  document.head.appendChild(s);
}

async function doVerifyCode() {
  const code = document.getElementById('inputBindCode').value.trim();
  if (!code) { showToast('請輸入驗證碼'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '驗證中...';

  const result = await callGAS('apiVerifyBindCode', [code]);

  btn.disabled = false;
  btn.textContent = '驗證';

  if (!result.valid) {
    showToast('❌ 驗證碼錯誤，請重新輸入');
    return;
  }
  showForm();
}

async function doBindByIdentity() {
  const name = document.getElementById('inputName').value.trim();
  const employeeId = document.getElementById('inputEmployeeId').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();

  if (!name) { showToast('請填入姓名'); return; }
  if (!employeeId) { showToast('請填入員工編號'); return; }
  if (!phone) { showToast('請填入手機號碼'); return; }
  if (!lineUid) { showToast('LINE 身分未取得，請重新整理'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '驗證中...';

  const result = await callGAS('apiBindByIdentity', [lineUid, displayName, name, employeeId, phone, isTest]);

  btn.disabled = false;
  btn.textContent = '確認綁定';

  if (result.error) {
    showToast('❌ ' + result.error);
    return;
  }

  document.getElementById('successName').textContent = `您好，${result.name}！`;
  document.getElementById('formView').style.display = 'none';
  document.getElementById('successView').style.display = 'block';
}

function goToDashboard() {
  location.href = '?page=dashboard' + (isTest ? '&isTest=true' : '');
}

function callGAS(fn, args) {
  return new Promise((resolve, reject) => {
    let runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
    runner[fn](...(args || []));
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
