name: Deploy KPI Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "flask_backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: flask_backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: flask_backend
        run: pytest tests/ -v --tb=short

  security-audit:  # [P1-PKG-01] Reject High+ CVEs in dependencies before deploy
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for High+ CVEs
        working-directory: flask_backend
        run: pip-audit .

  deploy:
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: kaohe-backend
          source: ./flask_backend
          project_id: linchun-hr
          region: asia-east1
          flags: "--allow-unauthenticated"

  deploy-test:
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: kaohe-backend-test
          source: ./flask_backend
          project_id: linchun-hr
          region: asia-east1
          flags: "--allow-unauthenticated"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [test-backend, security-audit, deploy, deploy-test]
    if: failure()
    steps:
      - name: Push LINE notification
        env:
          GAS_URL: ${{ secrets.GAS_WEB_APP_URL }}
          SECRET: ${{ secrets.BRIDGE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ CI 失敗：KPI Backend Deploy\n分支：${{ github.ref_name }}\nCommit：${COMMIT_MSG}\n查看：${RUN_URL}"
          curl -s -X POST "$GAS_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"apiNotifyOwner\",\"args\":[\"${SECRET}\",\"${MSG}\"]}"
