name: Deploy KPI Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "flask_backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: kaohe-backend
          source: ./flask_backend
          project_id: linchun-hr
          region: asia-east1
          flags: "--allow-unauthenticated"

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Push LINE notification
        env:
          GAS_URL: ${{ secrets.GAS_WEB_APP_URL }}
          SECRET: ${{ secrets.BRIDGE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ CI 失敗：KPI Backend Deploy\n分支：${{ github.ref_name }}\nCommit：${COMMIT_MSG}\n查看：${RUN_URL}"
          curl -s -X POST "$GAS_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"apiNotifyOwner\",\"args\":[\"${SECRET}\",\"${MSG}\"]}"
