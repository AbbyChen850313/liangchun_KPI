name: Deploy GAS (Apps Script)

on:
  push:
    branches: [main]
    paths:
      - "考核系統/gas/**"
      - ".github/workflows/deploy-gas.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Push and deploy
        working-directory: 考核系統/gas
        run: |
          clasp push --force
          clasp deploy

  notify-failure:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Push LINE notification
        env:
          GAS_URL: ${{ secrets.GAS_WEB_APP_URL }}
          SECRET: ${{ secrets.BRIDGE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ CI 失敗：KPI GAS Deploy\n分支：${{ github.ref_name }}\nCommit：${COMMIT_MSG}\n查看：${RUN_URL}"
          curl -s -X POST "$GAS_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"apiNotifyOwner\",\"args\":[\"${SECRET}\",\"${MSG}\"]}"
