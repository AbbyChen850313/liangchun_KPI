name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://kaohe-backend-843141939177.asia-east1.run.app
          VITE_LIFF_ID: 2009611318-5UphK9JK
          VITE_IS_TEST: "false"
        run: npm run build

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project linchun-hr --token "${{ secrets.FIREBASE_TOKEN }}"

  notify-failure:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: failure()
    steps:
      - name: Push LINE notification
        env:
          GAS_URL: ${{ secrets.GAS_WEB_APP_URL }}
          SECRET: ${{ secrets.BRIDGE_SECRET }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          MSG="❌ CI 失敗：KPI Frontend Deploy\n分支：${{ github.ref_name }}\nCommit：${COMMIT_MSG}\n查看：${RUN_URL}"
          curl -s -X POST "$GAS_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"apiNotifyOwner\",\"args\":[\"${SECRET}\",\"${MSG}\"]}"
