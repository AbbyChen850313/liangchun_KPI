<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系統管理員</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="../shared/config.js"></script>
  <script src="../shared/utils.js"></script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 模擬視角覆蓋層 */
    .sim-view { display:none; position:fixed; inset:0; background:var(--bg); background-attachment:fixed; z-index:200; overflow-y:auto; }
    .sim-view.open { display:block; }
    .sim-header { background:rgba(0,0,0,0.3); backdrop-filter:blur(12px); color:white; padding:16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--card-border); }
    .sim-back { background:none; border:none; color:white; font-size:22px; cursor:pointer; padding:0 4px; line-height:1; }
    .sim-title { font-size:16px; font-weight:bold; }
    .sim-sub { font-size:12px; opacity:.8; margin-top:2px; }

    .env-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:bold; }
    .env-test  { background:rgba(76,223,138,0.2); color:var(--green); }
    .env-prod  { background:rgba(255,209,102,0.2); color:var(--yellow); }

    .info-card { background:var(--card); border:1px solid var(--card-border); border-radius:10px; padding:14px 16px; margin-bottom:10px; backdrop-filter:blur(6px); }
    .info-row  { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--divider); font-size:13px; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--text-muted); }
    .info-value { font-weight:bold; color:var(--text); }
  </style>
</head>
<body>

<div class="header" style="position:relative">
  <a href="dashboard.html" style="text-decoration:none;color:inherit">
    <h1>🔧 系統管理員</h1>
    <div class="subtitle">SysAdmin 控制台</div>
  </a>
  <a id="homeLink" href="dashboard.html" style="position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:12px;color:rgba(255,255,255,0.8);text-decoration:none;background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:6px">← 首頁</a>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('status')">系統狀態</button>
  <button class="tab-btn" onclick="switchTab('simulate')">模擬視角</button>
  <button class="tab-btn" onclick="switchTab('accounts')">帳號管理</button>
  <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
  <button class="tab-btn" onclick="switchTab('logs')">日誌</button>
</div>

<!-- ── 系統狀態 ── -->
<div class="tab-content active" id="tab-status">
  <div style="padding:8px">
    <div id="statusContent"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<!-- ── 模擬視角 ── -->
<div class="tab-content" id="tab-simulate">
  <div style="padding:8px">
    <div class="info-card">
      <div class="section-title" style="margin-bottom:8px">選擇要模擬的帳號</div>
      <select id="simAccountSelect" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:10px">
        <option value="">-- 請選擇帳號 --</option>
      </select>
      <button class="btn btn-primary" style="width:100%;padding:12px" onclick="openSimView()">
        👁 模擬此帳號視角
      </button>
    </div>
    <div style="font-size:12px;color:#aaa;text-align:center;padding:8px">
      系統管理員可代入任何帳號角色查看對應畫面
    </div>
  </div>
</div>

<!-- ── 帳號管理 ── -->
<div class="tab-content" id="tab-accounts">
  <div style="padding:8px">
    <div style="margin-bottom:8px">
      <button class="btn btn-primary" style="width:100%;padding:10px" onclick="loadAccounts()">🔄 重新整理</button>
    </div>
    <div id="accountList"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<!-- ── 系統設定 ── -->
<div class="tab-content" id="tab-settings">
  <div class="score-section" style="margin:8px">
    <div class="section-title">評分期間設定</div>
    <div class="setting-group">
      <label class="setting-label">評分期間描述（顯示用）</label>
      <input type="text" class="setting-input" id="sys_period" placeholder="如：115/1~3月">
    </div>
    <div class="setting-group">
      <label class="setting-label">評分開始日</label>
      <input type="date" class="setting-input" id="sys_start">
    </div>
    <div class="setting-group">
      <label class="setting-label">評分截止日</label>
      <input type="date" class="setting-input" id="sys_end">
    </div>
    <div class="setting-group">
      <label class="setting-label">通知時間點1</label>
      <input type="date" class="setting-input" id="sys_notify1">
    </div>
    <div class="setting-group">
      <label class="setting-label">通知時間點2</label>
      <input type="date" class="setting-input" id="sys_notify2">
    </div>
    <div class="setting-group">
      <label class="setting-label">當前季度（如：115Q1）</label>
      <input type="text" class="setting-input" id="sys_quarter" placeholder="115Q1">
    </div>
    <div class="btn-group" style="padding:0;margin-top:12px">
      <button class="btn btn-primary" onclick="saveSysSettings()">儲存設定</button>
    </div>
  </div>

  <div class="score-section" style="margin:8px">
    <div class="section-title">系統管理設定</div>
    <div class="setting-group">
      <label class="setting-label">系統管理員員工編號（多人用逗號分隔）</label>
      <input type="text" class="setting-input" id="sys_adminIds" placeholder="如：A001,A002">
    </div>
    <div class="setting-group">
      <label class="setting-label">綁定驗證碼</label>
      <input type="text" class="setting-input" id="sys_bindCode" placeholder="預設：HR0000">
    </div>
    <div class="btn-group" style="padding:0;margin-top:12px">
      <button class="btn btn-primary" onclick="saveSysSettings()">儲存設定</button>
    </div>
  </div>
</div>

<!-- ── 日誌 ── -->
<div class="tab-content" id="tab-logs">
  <div style="padding:8px">
    <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" style="flex:1;padding:10px" onclick="loadLogs()">🔄 重新整理</button>
      <select id="logFilter" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px" onchange="renderLogs()">
        <option value="all">全部</option>
        <option value="ERROR">ERROR</option>
        <option value="WARN">WARN</option>
        <option value="INFO">INFO</option>
      </select>
    </div>
    <div id="logList"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<!-- ── 模擬視角 overlay ── -->
<div class="sim-view" id="simView">
  <div class="sim-header">
    <button class="sim-back" onclick="closeSimView()">←</button>
    <div style="flex:1;min-width:0">
      <div class="sim-title" id="simTitle">模擬視角</div>
      <div class="sim-sub" id="simSub"></div>
    </div>
    <select id="simViewSwitch" onchange="switchSimAccount(this)"
      style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.4);border-radius:6px;padding:6px 8px;font-size:12px;outline:none;max-width:120px;flex-shrink:0">
    </select>
  </div>
  <div id="simContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
let lineUid = decodeURIComponent(params.get('uid') || '') || localStorage.getItem(LS_UID) || '';

let _allAccounts = [];
let _logsCache   = [];

// homeLink already points to dashboard.html in HTML; lineUid is read from localStorage there

function switchTab(tab) {
  const tabs = ['status', 'simulate', 'accounts', 'settings', 'logs'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', tabs[i] === tab));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'status')    loadStatus();
  if (tab === 'simulate')  loadSimulateTab();
  if (tab === 'accounts')  loadAccounts();
  if (tab === 'settings')  loadSysSettings();
  if (tab === 'logs')      loadLogs();
}

// ── 系統狀態 ─────────────────────────────────────────────────────

async function loadStatus() {
  const settings = await callGAS('apiGetSettings', []);
  const isTest = settings['使用測試Channel'] === true || settings['使用測試Channel'] === 'true';
  const env = isTest ? '測試 Channel' : '正式 Channel';
  const envClass = isTest ? 'env-test' : 'env-prod';
  document.getElementById('statusContent').innerHTML = `
    <div class="info-card">
      <div class="section-title" style="margin-bottom:8px">環境狀態</div>
      <div style="text-align:center;padding:10px 0">
        <span class="env-badge ${envClass}">${isTest ? '✅' : '⚠️'} ${env}</span>
      </div>
      <div style="font-size:12px;color:#aaa;text-align:center;margin-top:4px">
        切換環境請傳 LINE Bot 關鍵字「啟用測試」或「啟用正式」→ ping
      </div>
    </div>
    <div class="info-card">
      <div class="section-title" style="margin-bottom:8px">系統設定</div>
      ${[
        ['當前季度',   settings['當前季度']        || '未設定'],
        ['評分期間',   settings['評分期間描述']     || '未設定'],
        ['評分開始日', settings['評分開始日']        || '未設定'],
        ['評分截止日', settings['評分截止日']        || '未設定'],
        ['通知時間點1', settings['通知時間點1']      || '未設定'],
        ['通知時間點2', settings['通知時間點2']      || '未設定'],
      ].map(([k, v]) => `<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v}</span></div>`).join('')}
    </div>`;
}

// ── 模擬視角 ─────────────────────────────────────────────────────

async function loadSimulateTab() {
  const accounts = await callGAS('apiGetAllAccounts', [lineUid, IS_TEST]);
  if (!accounts || accounts.error) {
    showToast('❌ ' + ((accounts && accounts.error) || '無法載入帳號清單'));
    document.getElementById('simAccountSelect').innerHTML = '<option value="">-- 載入失敗，請重試 --</option>';
    return;
  }
  _allAccounts = accounts;

  // 顯示所有有 UID 的帳號；測試環境優先用 testUid，無 testUid 則回退 lineUid
  const opts = accounts
    .filter(a => a.lineUid || a.testUid)
    .map(a => {
      const uid = (IS_TEST && a.testUid) ? a.testUid : a.lineUid;
      if (!uid) return '';
      const note = IS_TEST && !a.testUid ? '【未綁測試】' : '';
      return `<option value="${escHtml(uid)}" data-role="${escHtml(a.role || '')}" data-name="${escHtml(a.name)}">${escHtml(a.name)}（${escHtml(a.role || '同仁')}）${note}</option>`;
    }).filter(Boolean).join('');

  if (!opts) {
    document.getElementById('simAccountSelect').innerHTML = '<option value="">-- 尚無已綁定帳號 --</option>';
    document.getElementById('simViewSwitch').innerHTML = '';
    return;
  }

  document.getElementById('simAccountSelect').innerHTML = '<option value="">-- 請選擇帳號 --</option>' + opts;
  document.getElementById('simViewSwitch').innerHTML = opts;
}

async function openSimView() {
  const sel = document.getElementById('simAccountSelect');
  const targetUid = sel.value;
  if (!targetUid) { showToast('請先選擇帳號'); return; }
  const opt = sel.options[sel.selectedIndex];
  const name = opt.dataset.name;
  const role = opt.dataset.role;

  document.getElementById('simTitle').textContent = name;
  document.getElementById('simSub').textContent = `角色：${role || '同仁'}`;
  document.getElementById('simContent').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  document.getElementById('simView').classList.add('open');
  // 同步覆蓋層下拉的選中狀態
  document.getElementById('simViewSwitch').value = targetUid;

  if (role === 'HR' || role === '系統管理員') {
    await _loadSimHRView(targetUid);
  } else {
    await _loadSimManagerView(targetUid);
  }
}

async function _loadSimManagerView(targetUid) {
  const data = await callGAS('apiGetManagerDashboard', [lineUid, targetUid, IS_TEST]);
  if (!data || data.error) {
    document.getElementById('simContent').innerHTML =
      `<div class="loading" style="color:#f44336">${(data && data.error) || '無法載入'}</div>`;
    return;
  }
  const emps = data.employees || [];
  const pct = data.total > 0 ? Math.round(data.scored / data.total * 100) : 0;
  document.getElementById('simSub').textContent = `角色：主管 ｜ 已評 ${data.scored}/${data.total} 人（${pct}%）`;

  if (emps.length === 0) {
    document.getElementById('simContent').innerHTML = '<div class="loading">此主管無負責員工</div>';
    return;
  }
  document.getElementById('simContent').innerHTML =
    `<div class="employee-list">` +
    emps.map(emp => {
      const st = emp.scoreStatus || '未評分';
      const badgeClass = st === '已送出' ? 'badge-done' : st === '草稿' ? 'badge-draft' : 'badge-pending';
      const cardClass = emp.isProbation ? 'employee-card probation' : 'employee-card';
      return `<div class="${cardClass}">
        <div class="emp-avatar">${emp.name ? emp.name.charAt(0) : '?'}</div>
        <div class="emp-info">
          <div class="emp-name">${emp.name}${emp.isProbation ? '<span class="emp-badge badge-probation" style="font-size:10px;margin-left:4px">試用期</span>' : ''}</div>
          <div class="emp-meta">${emp.section} · 年資 ${emp.tenure || '-'}</div>
        </div>
        <span class="emp-badge ${badgeClass}">${st}</span>
      </div>`;
    }).join('') +
    `</div>`;
}

async function _loadSimHRView(targetUid) {
  const status = await callGAS('apiGetAllStatus', [lineUid, IS_TEST]);
  if (!status || status.error) {
    document.getElementById('simContent').innerHTML =
      `<div class="loading" style="color:#f44336">${(status && status.error) || '無法載入'}</div>`;
    return;
  }
  document.getElementById('simSub').textContent = `角色：HR ｜ 共 ${status.length} 位主管`;
  document.getElementById('simContent').innerHTML =
    `<div style="padding:8px">` +
    status.map(s => {
      const pct = s.total > 0 ? Math.round(s.scored / s.total * 100) : 0;
      const color = pct === 100 ? '#2e7d32' : pct > 0 ? '#f57f17' : '#9e9e9e';
      return `<div class="list-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:bold;font-size:15px">${escHtml(s.managerName)}</span>
          <span style="font-size:13px;font-weight:bold;color:${color}">${pct}%</span>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">已評 ${s.scored} / 共 ${s.total} 人</div>
        <div style="height:4px;background:rgba(255,255,255,0.15);border-radius:2px">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:2px"></div>
        </div>
      </div>`;
    }).join('') +
    `</div>`;
}

function closeSimView() {
  document.getElementById('simView').classList.remove('open');
}

async function switchSimAccount(sel) {
  const targetUid = sel.value;
  if (!targetUid) return;
  const opt = sel.options[sel.selectedIndex];
  const name = opt.dataset.name;
  const role = opt.dataset.role || '';

  document.getElementById('simTitle').textContent = name;
  document.getElementById('simSub').textContent = `角色：${role || '同仁'}`;
  document.getElementById('simContent').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  // 同步主頁下拉
  document.getElementById('simAccountSelect').value = targetUid;

  if (role === 'HR' || role === '系統管理員') {
    await _loadSimHRView(targetUid);
  } else {
    await _loadSimManagerView(targetUid);
  }
}

// ── 帳號管理 ─────────────────────────────────────────────────────

async function loadAccounts() {
  document.getElementById('accountList').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  const accounts = await callGAS('apiGetAllAccounts', [lineUid, IS_TEST]);
  if (!accounts || accounts.error) {
    document.getElementById('accountList').innerHTML =
      `<div class="loading" style="color:#f44336">${(accounts && accounts.error) || '無法載入'}</div>`;
    return;
  }
  if (accounts.length === 0) {
    document.getElementById('accountList').innerHTML = '<div class="loading">尚無已綁定帳號</div>';
    return;
  }
  document.getElementById('accountList').innerHTML = accounts.map(a => `
    <div class="list-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:bold;font-size:15px">${escHtml(a.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${escHtml(a.role || '同仁')} ｜ ${escHtml(a.phone) || '未填電話'}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:2px">綁定：${escHtml(a.boundAt)}</div>
        </div>
        <button class="btn btn-danger" style="flex:none;padding:8px 14px;font-size:13px"
                data-uid="${escHtml(a.lineUid)}" data-name="${escHtml(a.name)}"
                onclick="resetAccount(this.dataset.uid, this.dataset.name)">取消綁定</button>
      </div>
    </div>`).join('');
}

async function resetAccount(targetUid, name) {
  if (!confirm(`確認取消 ${name} 的帳號綁定？`)) return;
  const result = await callGAS('apiResetAccount', [lineUid, targetUid, IS_TEST]);
  if (result.error) {
    showToast('❌ ' + result.error);
  } else {
    showToast(`✅ 已取消 ${name} 的綁定`);
    loadAccounts();
  }
}

// ── 日誌 ─────────────────────────────────────────────────────────

async function loadLogs() {
  document.getElementById('logList').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  const logs = await callGAS('apiGetLogs', [lineUid, IS_TEST]);
  if (!logs || logs.error) {
    document.getElementById('logList').innerHTML =
      `<div class="loading" style="color:#f44336">${(logs && logs.error) || '無法載入'}</div>`;
    return;
  }
  _logsCache = logs;
  renderLogs();
}

function renderLogs() {
  const filter = document.getElementById('logFilter').value;
  const logs = filter === 'all' ? _logsCache : _logsCache.filter(l => l.level === filter);
  if (logs.length === 0) {
    document.getElementById('logList').innerHTML = '<div class="loading">無日誌記錄</div>';
    return;
  }
  const levelColor = { ERROR: '#f44336', WARN: '#f57f17', INFO: '#1565c0' };
  document.getElementById('logList').innerHTML = logs.map(l => `
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid ${levelColor[l.level] || 'var(--card-border)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;font-weight:bold;color:${levelColor[l.level] || 'var(--text-muted)'}">${l.level}</span>
        <span style="font-size:11px;color:var(--text-sub)">${l.time}</span>
      </div>
      <div style="font-size:13px;color:var(--text)">[${escHtml(l.fn)}] ${escHtml(l.msg)}</div>
      ${l.detail ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;word-break:break-all">${escHtml(l.detail)}</div>` : ''}
    </div>`).join('');
}

// ── 系統設定 ─────────────────────────────────────────────────────

async function loadSysSettings() {
  const settings = await callGAS('apiGetSettings', []);
  const toDate = v => {
    if (!v) return '';
    const d = new Date(v);
    return isNaN(d) ? '' : d.toISOString().split('T')[0];
  };
  document.getElementById('sys_period').value   = settings['評分期間描述'] || '';
  document.getElementById('sys_start').value    = toDate(settings['評分開始日']);
  document.getElementById('sys_end').value      = toDate(settings['評分截止日']);
  document.getElementById('sys_notify1').value  = toDate(settings['通知時間點1']);
  document.getElementById('sys_notify2').value  = toDate(settings['通知時間點2']);
  document.getElementById('sys_quarter').value  = settings['當前季度'] || '';
  document.getElementById('sys_adminIds').value = settings['系統管理員員工編號'] || '';
  document.getElementById('sys_bindCode').value = settings['綁定驗證碼'] || '';
}

async function saveSysSettings() {
  const result = await callGAS('apiUpdateSettings', [lineUid, {
    '評分期間描述':     document.getElementById('sys_period').value,
    '評分開始日':       document.getElementById('sys_start').value,
    '評分截止日':       document.getElementById('sys_end').value,
    '通知時間點1':      document.getElementById('sys_notify1').value,
    '通知時間點2':      document.getElementById('sys_notify2').value,
    '當前季度':         document.getElementById('sys_quarter').value,
    '系統管理員員工編號': document.getElementById('sys_adminIds').value,
    '綁定驗證碼':       document.getElementById('sys_bindCode').value,
  }]);
  showToast(result.error ? '❌ ' + result.error : '✅ 設定已儲存');
}

// ── 共用 ─────────────────────────────────────────────────────────

loadStatus();
</script>
</body>
</html>
