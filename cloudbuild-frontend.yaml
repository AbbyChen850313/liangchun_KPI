steps:
  - name: node:20
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        rm -f package-lock.json
        npm install

  - name: node:20
    dir: frontend
    entrypoint: npm
    args: [run, build]
    env:
      - VITE_API_URL=https://kaohe-backend-843141939177.asia-east1.run.app
      - VITE_LIFF_ID=2009611318-5UphK9JK
      - VITE_IS_TEST=false

  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project linchun-hr --non-interactive

options:
  logging: CLOUD_LOGGING_ONLY
