steps:
  - name: node:20
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        rm -f package-lock.json
        npm install

  # ── Test build (VITE_IS_TEST=true) ──────────────────────────────────────
  # VITE_LIFF_ID_TEST must point to the LIFF app whose endpoint is
  # https://linchun-hr-test.web.app in LINE Developers Console.
  - name: node:20
    dir: frontend
    entrypoint: npm
    args: [run, build]
    env:
      - VITE_API_URL=https://kaohe-backend-test-6cfy7zdzmq-de.a.run.app
      - VITE_LIFF_ID_TEST=${_LIFF_ID_TEST}
      - VITE_IS_TEST=true

  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting:test --project linchun-hr --non-interactive

  # ── Prod build (VITE_IS_TEST=false) ─────────────────────────────────────
  - name: node:20
    dir: frontend
    entrypoint: npm
    args: [run, build]
    env:
      - VITE_API_URL=https://kaohe-backend-843141939177.asia-east1.run.app
      - VITE_LIFF_ID=2009611318-5UphK9JK
      - VITE_IS_TEST=false

  - name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting:prod --project linchun-hr --non-interactive

substitutions:
  _LIFF_ID_TEST: "2009619528-aJO34c6u"  # Test LIFF app (endpoint: https://linchun-hr-test.web.app)

options:
  logging: CLOUD_LOGGING_ONLY
