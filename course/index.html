<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>115年教育訓練 個人課表</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', -apple-system, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .page-header { text-align: center; margin-bottom: 32px; }
    .page-header h1 { font-size: 22px; font-weight: 800; color: #2d3748; letter-spacing: 0.02em; }
    .page-header p { margin-top: 6px; color: #718096; font-size: 14px; }
    .filter-bar { max-width: 420px; margin: 0 auto 28px; }
    .filter-bar input {
      width: 100%; padding: 10px 16px; border: 2px solid #e2e8f0;
      border-radius: 24px; font-size: 15px; outline: none;
      transition: border-color .2s; background: white; color: #2d3748;
    }
    .filter-bar input:focus { border-color: #667eea; }
    .cards { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .person-card {
      background: white; border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(102,126,234,0.12); transition: transform .2s;
    }
    .person-card:hover { transform: translateY(-2px); }
    .card-header {
      padding: 18px 22px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; display: flex; align-items: center; gap: 14px;
    }
    .avatar {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.25); display: flex;
      align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; flex-shrink: 0;
    }
    .person-info .name { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; }
    .person-info .subtitle { font-size: 13px; opacity: 0.85; margin-top: 2px; }
    .person-info .emp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .emp-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.22); color: white; }
    .share-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin: 0 14px 14px; padding: 10px; background: #06C755; color: white;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; transition: opacity .15s;
    }
    .share-btn:hover { opacity: 0.85; }
    .course-list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .course-item { padding: 14px 16px; border-radius: 12px; background: #f7f9ff; border-left: 4px solid #667eea; }
    .color-0 { border-left-color: #667eea; }
    .color-1 { border-left-color: #48bb78; }
    .color-2 { border-left-color: #f6ad55; }
    .color-3 { border-left-color: #fc8181; }
    .color-4 { border-left-color: #76e4f7; }
    .course-name { font-size: 14px; font-weight: 600; color: #2d3748; margin-bottom: 8px; line-height: 1.4; }
    .course-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
    .tag-date { background: #ebf4ff; color: #2b6cb0; }
    .tag-time { background: #f0fff4; color: #276749; }
    .target-note { margin-top: 8px; font-size: 11px; color: #a0aec0; line-height: 1.4; }
    .loading { text-align: center; padding: 60px 0; color: #718096; font-size: 16px; }
    .error-box { max-width: 420px; margin: 40px auto; background: #fff5f5; border: 1px solid #fc8181; border-radius: 16px; padding: 24px; text-align: center; color: #c53030; }
    .page-footer { text-align: center; margin-top: 40px; font-size: 12px; color: #a0aec0; }
    .person-card.hidden { display: none; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>🎓 115年核心職能教育訓練</h1>
  <p>個人課表 — 點名時請帶上這份清單</p>
</div>

<div class="filter-bar">
  <input type="text" id="search" placeholder="搜尋姓名…" oninput="filterCards(this.value)">
</div>

<div class="cards" id="cards">
  <div class="loading">載入中…</div>
</div>

<div class="page-footer">本頁由課程資料庫自動產生</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzRqOkZXmxzGeAucKnp8dgV7UrdMz6EpgFumxtsm4Ffq9zWLqecXPB0s7VqaJBUm8UHDA/exec?action=data';

  const colorMap = {};
  let colorIdx = 0;
  function getColor(t) {
    if (!(t in colorMap)) colorMap[t] = colorIdx++ % 5;
    return colorMap[t];
  }

  function buildLineMessage(name, p, courses) {
    const info = [p.dept, p.section, p.title].filter(Boolean).join(' ');
    let msg = `🎓 115年核心職能教育訓練\n────────────────\n👤 ${name}　${info}\n\n📋 您的課程安排：\n`;
    msg += courses.map(c => {
      const time = (c.startTime && c.endTime) ? ` ${c.startTime}–${c.endTime}` : '';
      return `▪ ${c.date}${time}\n  ${c.courseType}`;
    }).join('\n');
    msg += '\n────────────────\n如有疑問請洽永續發展科。';
    return msg;
  }

  function renderCards(data) {
    const container = document.getElementById('cards');
    container.innerHTML = '';

    if (data.error) {
      container.innerHTML = `<div class="error-box">⚠️ ${data.error}</div>`;
      return;
    }

    const persons = data.persons;
    Object.keys(persons).sort((a, b) => a.localeCompare(b, 'zh-TW')).forEach(name => {
      const p = persons[name];
      const courses = p.courses;

      const empParts = [p.dept, p.section, p.title, p.grade ? `職等${p.grade}` : ''].filter(Boolean);
      const empTagsHtml = empParts.length
        ? `<div class="emp-tags">${empParts.map(t => `<span class="emp-tag">${t}</span>`).join('')}</div>` : '';

      const courseItems = courses.map(c => {
        const timePart = (c.startTime && c.endTime) ? `<span class="tag tag-time">⏰ ${c.startTime}–${c.endTime}</span>` : '';
        const targetPart = c.target ? `<div class="target-note">📌 ${c.target}</div>` : '';
        return `<div class="course-item color-${getColor(c.courseType)}">
          <div class="course-name">${c.courseType}</div>
          <div class="course-tags"><span class="tag tag-date">📅 ${c.date}</span>${timePart}</div>
          ${targetPart}</div>`;
      }).join('');

      const encoded = encodeURIComponent(buildLineMessage(name, p, courses));
      const lineUrl = 'https://line.me/R/msg/text/?' + encoded;

      const card = document.createElement('div');
      card.className = 'person-card';
      card.dataset.name = name;
      card.innerHTML = `
        <div class="card-header">
          <div class="avatar">${name.charAt(0)}</div>
          <div class="person-info">
            <div class="name">${name}</div>
            <div class="subtitle">共 ${courses.length} 堂課程</div>
            ${empTagsHtml}
          </div>
        </div>
        <div class="course-list">${courseItems}</div>
        <a class="share-btn" href="${lineUrl}" target="_blank">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
          傳送給 ${name}
        </a>`;
      container.appendChild(card);
    });
  }

  function filterCards(kw) {
    document.querySelectorAll('.person-card').forEach(card => {
      card.classList.toggle('hidden', kw.trim() && !card.dataset.name.includes(kw.trim()));
    });
  }

  fetch(API_URL)
    .then(r => r.json())
    .then(renderCards)
    .catch(() => {
      document.getElementById('cards').innerHTML = '<div class="error-box">⚠️ 無法載入資料，請稍後再試。</div>';
    });
</script>
</body>
</html>
