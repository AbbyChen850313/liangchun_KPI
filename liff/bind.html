<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>帳號綁定</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="../shared/config.js"></script>
  <script src="../shared/utils.js"></script>
</head>
<body>

<div class="header">
  <h1>帳號綁定</h1>
  <div class="subtitle" id="bindSubtitle">驗證您的身分</div>
</div>

<!-- 載入中 -->
<div id="loadingView" style="padding:40px 20px;text-align:center;color:#888">
  <div class="spinner" style="margin:0 auto 12px"></div>
  <div id="loadingStep">載入 SDK...</div>
</div>

<!-- 錯誤顯示 -->
<div id="errorView" style="display:none;margin:12px 8px;padding:14px;background:#ffebee;border-radius:8px;color:#c62828;font-size:13px">
  <strong>錯誤：</strong><span id="errorMsg"></span>
</div>

<!-- 驗證碼畫面（未綁定者必須先通過此關卡） -->
<div id="verifyView" style="display:none">
  <div class="score-section" style="margin:12px 8px">
    <div class="setting-group">
      <input type="text" class="setting-input" id="inputVerifyCode"
        placeholder="請輸入驗證碼"
        autocomplete="off"
        style="letter-spacing:4px;font-size:18px;text-align:center"
        onkeydown="if(event.key==='Enter') doVerifyCode()">
    </div>
    <p style="font-size:12px;color:#aaa;text-align:center;margin:4px 0 12px">（僅工作人員輸入）</p>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1;padding:14px;background:#eee;color:#555"
        onclick="doCancel()">取消</button>
      <button class="btn btn-submit" id="verifyBtn" style="flex:2;padding:14px"
        onclick="doVerifyCode()">確認</button>
    </div>
  </div>
</div>

<!-- 員工資料表單（驗證碼通過後才顯示） -->
<div id="formView" style="display:none">
  <div class="score-section" style="margin:12px 8px">
    <div class="section-title">請輸入員工資料</div>

    <div class="setting-group">
      <label class="setting-label">姓名</label>
      <input type="text" class="setting-input" id="inputName" placeholder="請輸入您的姓名">
    </div>

    <div class="setting-group">
      <label class="setting-label">員工編號</label>
      <input type="text" class="setting-input" id="inputEmployeeId" placeholder="請輸入員工編號">
    </div>

    <div class="setting-group">
      <label class="setting-label">手機號碼</label>
      <input type="tel" class="setting-input" id="inputPhone" placeholder="例：0912345678">
    </div>

    <button class="btn btn-submit" style="width:100%;padding:14px;margin-top:4px" onclick="doBindByIdentity()">
      確認綁定
    </button>
  </div>
</div>

<!-- 綁定成功畫面 -->
<div id="successView" style="display:none">
  <div style="padding:40px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">🎉</div>
    <div style="font-size:18px;font-weight:bold;margin-bottom:8px">綁定成功！</div>
    <div style="font-size:14px;color:#555;margin-bottom:4px" id="successName"></div>
    <div style="font-size:13px;color:#888;margin-bottom:24px">
      您的帳號已完成綁定，即可開始使用。
    </div>
    <button class="btn btn-submit" style="width:80%;padding:14px" onclick="goToDashboard(_boundRole)">
      進入考核系統
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let lineUid = '';
let displayName = '';
let _boundRole = '';

function _hide(id) { document.getElementById(id).style.display = 'none'; }
function _show(id, display) { document.getElementById(id).style.display = display || 'block'; }

function showError(msg) {
  _hide('loadingView');
  document.getElementById('errorMsg').textContent = msg;
  _show('errorView');
}

function showVerifyView() {
  _hide('loadingView');
  _show('verifyView');
}

function showForm() {
  _hide('verifyView');
  _show('formView');
}

async function init() {
  // 有快取 UID → 直接查綁定狀態，不等 LIFF
  const cachedUid = localStorage.getItem(LS_UID);
  if (cachedUid) {
    document.getElementById('loadingStep').textContent = '查詢帳號狀態...';
    try {
      const check = await Promise.race([
        callGAS('apiCheckBinding', [cachedUid, IS_TEST]),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
      ]);
      if (check && check.bound) {
        lineUid = cachedUid;
        goToDashboard(check.role);
        return;
      }
    } catch (e) { console.warn('[bind] cached binding check failed, falling back to LIFF:', e?.message); }
  }

  // 沒快取或未綁定 → 走 LIFF 流程
  try {
    document.getElementById('loadingStep').textContent = 'LIFF 初始化...';
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF init timeout')), 10000)),
    ]);

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    lineUid = profile.userId;
    displayName = profile.displayName;

    if (lineUid !== cachedUid) localStorage.setItem(LS_UID, lineUid);

    document.getElementById('loadingStep').textContent = '查詢帳號狀態...';
    const check = await Promise.race([
      callGAS('apiCheckBinding', [lineUid, IS_TEST]),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
    ]).catch(() => null);

    if (check && check.bound) {
      goToDashboard(check.role);
      return;
    }

    // 未綁定 → 顯示驗證碼畫面
    showVerifyView();
  } catch (err) {
    if (cachedUid) {
      lineUid = cachedUid;
      showVerifyView();
    } else {
      showError(err.message);
    }
  }
}

async function doVerifyCode() {
  const code = document.getElementById('inputVerifyCode').value.trim();
  if (!code) { showToast('請輸入驗證碼'); return; }

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    const result = await Promise.race([
      callGAS('apiVerifyBindCode', [code]),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000)),
    ]);

    if (result && result.valid) {
      showForm();
    } else {
      showToast('❌ 驗證碼錯誤');
    }
  } catch (e) {
    console.warn('[verifyCode] error:', e?.message);
    showToast('驗證失敗，請重試');
  } finally {
    btn.disabled = false;
    btn.textContent = '確認';
  }
}

function doCancel() {
  if (typeof liff !== 'undefined' && liff.closeWindow) {
    liff.closeWindow();
  } else {
    history.back();
  }
}

async function doBindByIdentity() {
  const name       = document.getElementById('inputName').value.trim();
  const employeeId = document.getElementById('inputEmployeeId').value.trim();
  const phone      = document.getElementById('inputPhone').value.trim();

  if (!name)       { showToast('請填入姓名'); return; }
  if (!employeeId) { showToast('請填入員工編號'); return; }
  if (!phone)      { showToast('請填入手機號碼'); return; }
  if (!lineUid)    { showToast('LINE 身分未取得，請稍後再試'); return; }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '驗證中...';

  const result = await callGAS('apiBindByIdentity', [lineUid, displayName, name, employeeId, phone, IS_TEST]);

  btn.disabled = false;
  btn.textContent = '確認綁定';

  if (result.error) {
    showToast('❌ ' + result.error);
    return;
  }

  _boundRole = result.role || '';
  document.getElementById('successName').textContent = `您好，${result.name}！`;
  _hide('formView');
  _show('successView');
  setTimeout(() => goToDashboard(_boundRole), 1500);
}

function goToDashboard(role) {
  if (lineUid) localStorage.setItem(LS_UID, lineUid);
  location.href = role === 'HR' ? 'admin.html' : 'dashboard.html';
}

const s = document.createElement('script');
s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
s.onerror = () => showError('LINE SDK 載入失敗，請重新整理');
s.onload = init;
document.head.appendChild(s);
</script>
</body>
</html>
