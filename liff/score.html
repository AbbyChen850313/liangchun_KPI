<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>評分</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="../shared/config.js"></script>
  <script src="../shared/utils.js"></script>
</head>
<body>

<div class="header">
  <h1>✏️ 員工評分</h1>
  <div class="subtitle" id="empTitle">載入中...</div>
</div>

<div class="info-bar" id="empInfoBar">
  <div class="info-row">
    <span class="info-label">姓名</span>
    <span class="info-value" id="empName">-</span>
  </div>
  <div class="info-row">
    <span class="info-label">科別</span>
    <span class="info-value" id="empSection">-</span>
  </div>
  <div class="info-row">
    <span class="info-label">年資</span>
    <span class="info-value" id="empTenure">-</span>
  </div>
  <div id="probationAlert" style="display:none;background:rgba(255,209,102,0.15);border:1px solid rgba(255,209,102,0.4);border-radius:8px;padding:8px 10px;margin-top:8px;font-size:12px;color:var(--yellow)">
    ⚠️ 試用期員工（未滿3個月），評分結果作為試用期表現參考。
  </div>
</div>

<div class="score-preview">
  <div>
    <div class="preview-label">目前平均分</div>
    <div class="preview-score" id="previewScore">--</div>
  </div>
  <div style="text-align:right">
    <div class="preview-label">加權後 (×<span id="weightLabel">?</span>)</div>
    <div class="preview-weighted" id="previewWeighted">--</div>
  </div>
</div>

<form id="scoreForm">
  <div class="score-section">
    <div class="section-title">工作績效評分</div>
    <div id="scoreItems"></div>
  </div>

  <div class="score-section">
    <div class="section-title">特殊加減分</div>
    <input type="number" class="special-input" id="specialAdj"
           placeholder="如：+5 或 -10（有申誡/小功請填寫）"
           step="0.5" min="-30" max="30"
           oninput="updatePreview()">
    <div style="font-size:11px;color:#aaa;margin-top:6px">
      申誡：-5 ｜ 小過：-10 ｜ 大過：-20 ｜ 小功：+5 ｜ 大功：+10
    </div>
  </div>

  <div class="score-section">
    <div class="section-title">備註（選填）</div>
    <textarea class="note-textarea" id="noteText" placeholder="可填寫具體表現說明..."></textarea>
  </div>
</form>

<div class="btn-group">
  <button class="btn btn-draft" onclick="saveDraft()">儲存草稿</button>
  <button class="btn btn-submit" id="submitBtn" onclick="showSubmitConfirm()">確認送出</button>
</div>
<div id="submit-confirm" style="display:none;margin:10px 0;padding:12px;background:#fff8e1;border-radius:8px;font-size:13px;text-align:center">
  <div id="submit-confirm-msg" style="margin-bottom:8px;color:#7b6000"></div>
  <div style="display:flex;gap:8px;justify-content:center">
    <button onclick="submitScore()" style="padding:6px 18px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px">確定送出</button>
    <button onclick="document.getElementById('submit-confirm').style.display='none'" style="padding:6px 18px;background:#eee;border:none;border-radius:6px;cursor:pointer;font-size:13px">取消</button>
  </div>
</div>

<div style="text-align:center;font-size:11px;color:#aaa;padding-bottom:20px">
  截止日前可隨時返回修改
</div>

<div class="toast" id="toast"></div>

<script>
const SCORE_ITEMS = [
  { key: 'item1', label: '【職能專業度】', desc: '根據公司任用職務項目，能充分自主完成工作' },
  { key: 'item2', label: '【工作效率】', desc: '工作效率高，如期達成工作目標' },
  { key: 'item3', label: '【成本意識】', desc: '成本意識強烈，能積極節省，避免浪費' },
  { key: 'item4', label: '【部門合作】', desc: '協作能力，能與同部門、跨部門同事配合' },
  { key: 'item5', label: '【責任感】', desc: '具有極責任心，能徹底達成任務' },
  { key: 'item6', label: '【主動積極】', desc: '能自動自發與人合作解決問題' },
];
const GRADES = [
  { label: '甲', score: 95, desc: '90-100分' },
  { label: '乙', score: 85, desc: '75-89分' },
  { label: '丙', score: 65, desc: '60-74分' },
  { label: '丁', score: 35, desc: '0-59分' },
];

let lineUid = localStorage.getItem(LS_UID) || '';
const employeeName = sessionStorage.getItem('score_eid') || '';
const section = sessionStorage.getItem('score_section') || '';

let weight = 1;
let currentScores = {};

async function init() {
  document.getElementById('empName').textContent = employeeName;
  document.getElementById('empSection').textContent = section;
  document.getElementById('empTitle').textContent = employeeName;
  renderScoreItems();

  // uid 可能已在 URL 中，但仍透過 LIFF 重新驗證確保安全
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      lineUid = profile.userId;
    }
  } catch (_) { /* LIFF 初始化失敗不影響頁面顯示，後端會再驗證 */ }

  loadExistingScores();
}

function renderScoreItems() {
  document.getElementById('scoreItems').innerHTML = SCORE_ITEMS.map(item => `
    <div class="score-item">
      <div class="score-item-label">${item.label}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:6px">${item.desc}</div>
      <div class="grade-options">
        ${GRADES.map(g => `
          <div class="grade-btn" id="btn_${item.key}_${g.label}"
               onclick="selectGrade('${item.key}', '${g.label}')">
            <div class="grade-label">${g.label}</div>
            <div class="grade-score">${g.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectGrade(itemKey, grade) {
  GRADES.forEach(g => {
    const btn = document.getElementById(`btn_${itemKey}_${g.label}`);
    if (btn) btn.className = 'grade-btn';
  });
  const btn = document.getElementById(`btn_${itemKey}_${grade}`);
  if (btn) btn.className = `grade-btn selected-${grade}`;
  currentScores[itemKey] = grade;
  updatePreview();
}

function updatePreview() {
  const scores = Object.values(currentScores).filter(v => v);
  if (scores.length === 0) {
    document.getElementById('previewScore').textContent = '--';
    document.getElementById('previewWeighted').textContent = '--';
    return;
  }
  const gradeMap = { '甲': 95, '乙': 85, '丙': 65, '丁': 35 };
  const avg = scores.reduce((s, g) => s + gradeMap[g], 0) / scores.length;
  const special = parseFloat(document.getElementById('specialAdj').value) || 0;
  const final = avg + special;
  document.getElementById('previewScore').textContent = final.toFixed(1);
  document.getElementById('previewWeighted').textContent = `${(final * weight).toFixed(1)} 分`;
}

function loadExistingScores() {
  callGAS('apiGetMyScores', [lineUid, null, IS_TEST]).then(allScores => {
    const existing = allScores[employeeName];
    if (!existing) return;
    Object.entries(existing.scores || {}).forEach(([key, val]) => { if (val) selectGrade(key, val); });
    if (existing.special) document.getElementById('specialAdj').value = existing.special;
    if (existing.note) document.getElementById('noteText').value = existing.note;
    updatePreview();
    if (existing.status === '已送出') document.getElementById('submitBtn').textContent = '修改送出';
  });

  callGAS('apiGetScoreStatus', [lineUid, IS_TEST]).then(status => {
    const emp = (status.employees || []).find(e => e.name === employeeName);
    if (emp) {
      document.getElementById('empTenure').textContent = emp.tenure || '-';
      weight = emp.weight || 1;
      document.getElementById('weightLabel').textContent = weight;
      if (emp.isProbation) document.getElementById('probationAlert').style.display = 'block';
      updatePreview();
    }
  });
}

function getFormData() {
  return {
    lineUid,
    quarter: null,
    employeeName,
    section,
    scores: { ...currentScores },
    special: document.getElementById('specialAdj').value || '0',
    note: document.getElementById('noteText').value,
    isTest: IS_TEST,
  };
}

function saveDraft() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '儲存中...';
  callGAS('apiSaveDraft', [getFormData()]).then(result => {
    btn.disabled = false;
    btn.textContent = '儲存草稿';
    showToast(result.error ? '❌ ' + result.error : '✅ 草稿已儲存');
  });
}

function showSubmitConfirm() {
  const filled = Object.keys(currentScores).filter(k => currentScores[k]);
  if (filled.length < SCORE_ITEMS.length) { showToast('⚠️ 請填寫所有評分項目'); return; }
  document.getElementById('submit-confirm-msg').textContent =
    `確認送出 ${employeeName} 的評分？截止日前可返回修改。`;
  document.getElementById('submit-confirm').style.display = 'block';
}

function submitScore() {
  document.getElementById('submit-confirm').style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  callGAS('apiSubmitScore', [getFormData()]).then(result => {
    btn.disabled = false;
    if (result.error) {
      btn.textContent = '確認送出';
      showToast('❌ ' + result.error);
    } else {
      btn.textContent = '修改送出';
      showToast(`✅ 已送出！加權分數：${result.weightedScore}`);
      setTimeout(() => history.back(), 1500);
    }
  });
}

const s = document.createElement('script');
s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
s.onload = init;
s.onerror = init; // SDK 失敗仍顯示評分頁（後端會驗證）
document.head.appendChild(s);
</script>
</body>
</html>
