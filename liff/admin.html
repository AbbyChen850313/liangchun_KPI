<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HR 管理後台</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <script src="../shared/config.js"></script>
  <script src="../shared/utils.js"></script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<div class="header" style="position:relative">
  <h1>⚙️ HR 管理後台</h1>
  <div class="subtitle">HR 管理後台</div>
  <a id="homeLink" href="dashboard.html" style="position:absolute;top:50%;right:16px;transform:translateY(-50%);font-size:12px;color:rgba(255,255,255,0.8);text-decoration:none;background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:6px">← 首頁</a>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('progress')">評分進度</button>
  <button class="tab-btn" onclick="switchTab('accounts')">帳號管理</button>
  <button class="tab-btn" onclick="switchTab('settings')">系統設定</button>
  <button class="tab-btn" onclick="switchTab('export')">匯出</button>
  <button class="tab-btn" onclick="switchTab('logs')">日誌</button>
</div>

<div class="tab-content active" id="tab-progress">
  <div style="padding:8px">
    <div style="margin-bottom:8px;display:flex;gap:8px">
      <button class="btn btn-secondary" style="flex:1;padding:10px" onclick="triggerReminder()">📢 發送提醒通知</button>
      <button class="btn btn-primary" style="flex:1;padding:10px" onclick="loadProgress()">🔄 重新整理</button>
    </div>
    <div id="progressTable"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<div class="tab-content" id="tab-accounts">
  <div style="padding:8px">
    <div style="margin-bottom:8px">
      <button class="btn btn-primary" style="width:100%;padding:10px" onclick="loadAccounts()">🔄 重新整理</button>
    </div>
    <div id="accountList"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<div class="tab-content" id="tab-settings">
  <div class="score-section" style="margin:8px">
    <div class="section-title">評分期間設定</div>
    <div class="setting-group">
      <label class="setting-label">評分期間描述（顯示用）</label>
      <input type="text" class="setting-input" id="set_period" placeholder="如：115/1~3月">
    </div>
    <div class="setting-group">
      <label class="setting-label">評分開始日</label>
      <input type="date" class="setting-input" id="set_start">
    </div>
    <div class="setting-group">
      <label class="setting-label">評分截止日</label>
      <input type="date" class="setting-input" id="set_end">
    </div>
    <div class="setting-group">
      <label class="setting-label">通知時間點1</label>
      <input type="date" class="setting-input" id="set_notify1">
    </div>
    <div class="setting-group">
      <label class="setting-label">通知時間點2</label>
      <input type="date" class="setting-input" id="set_notify2">
    </div>
    <div class="setting-group">
      <label class="setting-label">當前季度（如：115Q1）</label>
      <input type="text" class="setting-input" id="set_quarter" placeholder="115Q1">
    </div>
    <div class="btn-group" style="padding:0;margin-top:12px">
      <button class="btn btn-primary" onclick="saveSettings()">儲存設定</button>
    </div>
  </div>

  <div class="score-section" style="margin:8px">
    <div class="section-title">資料同步</div>
    <button class="btn btn-secondary" style="width:100%;padding:12px" onclick="syncEmployees()">
      🔄 從 HR Sheet 同步員工名單
    </button>
  </div>
</div>

<div class="tab-content" id="tab-export">
  <div class="score-section" style="margin:8px">
    <div class="section-title">匯出考核結果</div>
    <div class="setting-group">
      <label class="setting-label">選擇季度</label>
      <input type="text" class="setting-input" id="exportQuarter" placeholder="如：115Q1">
    </div>
    <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:8px" onclick="doExport()">
      📥 匯出 Excel（Google Sheets）
    </button>
    <div id="exportResult" style="margin-top:12px"></div>
  </div>
</div>

<div class="tab-content" id="tab-logs">
  <div style="padding:8px">
    <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center">
      <button class="btn btn-primary" style="flex:1;padding:10px" onclick="loadLogs()">🔄 重新整理</button>
      <select id="logFilter" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:13px" onchange="renderLogs()">
        <option value="all">全部</option>
        <option value="ERROR">ERROR</option>
        <option value="WARN">WARN</option>
        <option value="INFO">INFO</option>
      </select>
    </div>
    <div id="logList"><div class="loading"><div class="spinner"></div>載入中...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- inline confirm overlay (replaces browser confirm()) -->
<div id="confirm-overlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.45);align-items:flex-end;justify-content:center;padding-bottom:32px">
  <div style="background:#1e2433;border-radius:12px;padding:20px 16px;width:90%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.4)">
    <div id="confirm-msg" style="font-size:14px;color:#e0e6f0;margin-bottom:16px;line-height:1.5"></div>
    <div style="display:flex;gap:10px">
      <button onclick="_confirmCancel()" style="flex:1;padding:10px;background:rgba(255,255,255,0.1);color:#aaa;border:none;border-radius:8px;cursor:pointer;font-size:14px">取消</button>
      <button id="confirm-ok-btn" onclick="_confirmOk()" style="flex:1;padding:10px;background:#e53935;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold">確定</button>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
let lineUid = decodeURIComponent(params.get('uid') || '') || localStorage.getItem(LS_UID) || '';

// homeLink already points to dashboard.html in HTML; lineUid is read from localStorage there

function switchTab(tab) {
  const tabs = ['progress', 'accounts', 'settings', 'export', 'logs'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'progress') loadProgress();
  if (tab === 'accounts') loadAccounts();
  if (tab === 'settings' || tab === 'export') loadSettings();
  if (tab === 'logs') loadLogs();
}

async function loadProgress() {
  const status = await callGAS('apiGetAllStatus', [lineUid, IS_TEST]);
  if (!status || status.error) {
    document.getElementById('progressTable').innerHTML =
      `<div class="loading" style="color:#f44336">${(status && status.error) || '無法載入'}</div>`;
    return;
  }
  document.getElementById('progressTable').innerHTML = status.map(s => {
    const pct = s.total > 0 ? Math.round(s.scored / s.total * 100) : 0;
    const color = pct === 100 ? '#2e7d32' : pct > 0 ? '#f57f17' : '#9e9e9e';
    return `<div class="list-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-weight:bold;font-size:15px">${escHtml(s.managerName)}</span>
        <span style="font-size:13px;font-weight:bold;color:${color}">${pct}%</span>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">已評 ${s.scored} / 共 ${s.total} 人</div>
      <div style="height:4px;background:rgba(255,255,255,0.15);border-radius:2px">
        <div style="height:100%;width:${pct}%;background:${color};border-radius:2px;transition:width .3s"></div>
      </div>
    </div>`;
  }).join('');
}

let _pendingConfirm = null;
function showConfirm(msg, okLabel, onOk) {
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').textContent = okLabel || '確定';
  _pendingConfirm = onOk;
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function _confirmOk() {
  document.getElementById('confirm-overlay').style.display = 'none';
  if (_pendingConfirm) { _pendingConfirm(); _pendingConfirm = null; }
}
function _confirmCancel() {
  document.getElementById('confirm-overlay').style.display = 'none';
  _pendingConfirm = null;
}

async function triggerReminder() {
  showConfirm('確認發送提醒通知給所有未完成的主管？', '確定發送', async () => {
    const result = await callGAS('apiTriggerReminders', [lineUid, IS_TEST]);
    showToast(result.error ? '❌ ' + result.error : `✅ 已通知 ${result.notifiedCount} 位主管`);
  });
}

async function loadSettings() {
  const settings = await callGAS('apiGetSettings', []);
  document.getElementById('set_period').value = settings['評分期間描述'] || '';
  document.getElementById('set_start').value = toInputDate(settings['評分開始日']);
  document.getElementById('set_end').value = toInputDate(settings['評分截止日']);
  document.getElementById('set_notify1').value = toInputDate(settings['通知時間點1']);
  document.getElementById('set_notify2').value = toInputDate(settings['通知時間點2']);
  document.getElementById('set_quarter').value = settings['當前季度'] || '';
  document.getElementById('exportQuarter').value = settings['當前季度'] || '';
}

function toInputDate(val) {
  if (!val) return '';
  const d = new Date(val);
  return isNaN(d) ? '' : d.toISOString().split('T')[0];
}

async function saveSettings() {
  const result = await callGAS('apiUpdateSettings', [lineUid, {
    '評分期間描述': document.getElementById('set_period').value,
    '評分開始日':   document.getElementById('set_start').value,
    '評分截止日':   document.getElementById('set_end').value,
    '通知時間點1':  document.getElementById('set_notify1').value,
    '通知時間點2':  document.getElementById('set_notify2').value,
    '當前季度':     document.getElementById('set_quarter').value,
  }]);
  showToast(result.error ? '❌ ' + result.error : '✅ 設定已儲存');
}

async function syncEmployees() {
  showToast('⏳ 同步中...');
  const result = await callGAS('apiSyncEmployees', [lineUid]);
  showToast(result.error ? '❌ ' + result.error : `✅ 已同步 ${result.count} 位員工`);
}

async function doExport() {
  const quarter = document.getElementById('exportQuarter').value.trim();
  if (!quarter) { showToast('請填寫季度'); return; }
  document.getElementById('exportResult').innerHTML = '<div class="loading"><div class="spinner"></div>匯出中...</div>';
  const result = await callGAS('apiExportExcel', [lineUid, quarter, IS_TEST]);
  document.getElementById('exportResult').innerHTML = result.error
    ? `<div style="color:#f44336">${result.error}</div>`
    : `<div style="color:#2e7d32;margin-bottom:8px">✅ ${result.message}</div>
       <a href="${result.url}" target="_blank" style="color:#1565c0">📊 開啟匯出結果</a>`;
}

async function loadAccounts() {
  document.getElementById('accountList').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  const accounts = await callGAS('apiGetAllAccounts', [lineUid, IS_TEST]);
  if (!accounts || accounts.error) {
    document.getElementById('accountList').innerHTML =
      `<div class="loading" style="color:#f44336">${(accounts && accounts.error) || '無法載入'}</div>`;
    return;
  }
  if (accounts.length === 0) {
    document.getElementById('accountList').innerHTML = '<div class="loading">尚無已綁定帳號</div>';
    return;
  }
  document.getElementById('accountList').innerHTML = accounts.map(a => `
    <div class="list-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:bold;font-size:15px">${escHtml(a.name)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${escHtml(a.role)} ｜ ${escHtml(a.phone) || '未填電話'}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:2px">綁定：${escHtml(a.boundAt)}</div>
        </div>
        <button class="btn btn-danger" style="flex:none;padding:8px 14px;font-size:13px"
                data-uid="${escHtml(a.lineUid)}" data-name="${escHtml(a.name)}"
                onclick="resetAccount(this.dataset.uid, this.dataset.name)">取消綁定</button>
      </div>
    </div>`).join('');
}

let _logsCache = [];

async function loadLogs() {
  document.getElementById('logList').innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  const logs = await callGAS('apiGetLogs', [lineUid, IS_TEST]);
  if (!logs || logs.error) {
    document.getElementById('logList').innerHTML =
      `<div class="loading" style="color:#f44336">${(logs && logs.error) || '無法載入'}</div>`;
    return;
  }
  _logsCache = logs;
  renderLogs();
}

function renderLogs() {
  const filter = document.getElementById('logFilter').value;
  const logs = filter === 'all' ? _logsCache : _logsCache.filter(l => l.level === filter);
  if (logs.length === 0) {
    document.getElementById('logList').innerHTML = '<div class="loading">無日誌記錄</div>';
    return;
  }
  const levelColor = { ERROR: '#f44336', WARN: '#f57f17', INFO: '#1565c0' };
  document.getElementById('logList').innerHTML = logs.map(l => `
    <div style="background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid ${levelColor[l.level] || 'var(--card-border)'}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;font-weight:bold;color:${levelColor[l.level] || 'var(--text-muted)'}">${l.level}</span>
        <span style="font-size:11px;color:var(--text-sub)">${l.time}</span>
      </div>
      <div style="font-size:13px;color:var(--text)">[${escHtml(l.fn)}] ${escHtml(l.msg)}</div>
      ${l.detail ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px;word-break:break-all">${escHtml(l.detail)}</div>` : ''}
    </div>`).join('');
}

async function resetAccount(targetUid, name) {
  showConfirm(`確認取消 ${name} 的帳號綁定？取消後需重新綁定才能使用系統。`, '確定取消綁定', async () => {
    const result = await callGAS('apiResetAccount', [lineUid, targetUid, IS_TEST]);
    if (result.error) {
      showToast('❌ ' + result.error);
    } else {
      showToast(`✅ 已取消 ${name} 的綁定`);
      loadAccounts();
    }
  });
}

loadProgress();
</script>
</body>
</html>
